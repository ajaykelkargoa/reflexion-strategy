// ---- Local storage (in-progress drafts) ----
function sk(n){return"rfx5_"+n;}
function saveDraft(){

// ---- API (Firebase REST — no SDK needed) ----
function apiSave(cb){
  var url=DB+'/responses/'+S.w+'.json';
  fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({a:S.a,n:S.n,at:new Date().toISOString()})})
    .then(function(r){
      return r.text().then(function(t){
        var d=null;try{d=t?JSON.parse(t):null;}catch(e){}
        if(!r.ok || (d && d.error)){
          var msg=(d&&d.error)?d.error:('HTTP '+r.status+(t?' — '+t.slice(0,200):''));
          console.error('apiSave failed:',msg);
          if(cb)cb(false,msg);
          return;
        }
        if(cb)cb(true,null);
      });
    })
    .catch(function(err){
      console.error('apiSave network error:',err);
      if(cb)cb(false,(err&&err.message)||'Network error');
    });
}
function apiLoad(cb){
  fetch(DB+'/responses.json')
    .then(function(r){
      return r.text().then(function(t){
        var d=null;try{d=t?JSON.parse(t):null;}catch(e){}
        if(!r.ok || (d && d.error)){
          var msg=(d&&d.error)?d.error:('HTTP '+r.status+(t?' — '+t.slice(0,200):''));
          console.error('apiLoad failed:',msg);
          ALL={};LOAD_ERR=msg;
          if(cb)cb();
          return;
        }
        ALL=d||{};LOAD_ERR=null;
        if(cb)cb();
      });
    })
    .catch(function(err){
      console.error('apiLoad network error:',err);
      ALL={};LOAD_ERR=(err&&err.message)||'Network error';
      if(cb)cb();
    });
}

      var serverDone=!!(ALL[S.w]&&ALL[S.w].at);
      if(serverDone){
        h+='<div class="done-box"><p style="font-size:14px;font-weight:600;color:#1a6630">✓ Your responses are submitted</p><p style="font-size:13px;color:#5a8060;margin-top:4px">You can still review or update them.</p></div>';
        h+='<button class="btn-p" onclick="goForm()">Review my responses</button>';
      } else {
        h+='<button class="btn-p" onclick="goForm()">'+(hasDraft(S.w)?'Continue my reflections →':'Begin reflections →')+'</button>';
      }
    } else {
      h+='<p class="hint">Select your name to begin</p>';
    }

    h+='<div class="divider"></div>';
    var submitted=W.filter(function(n){return ALL[n]&&ALL[n].at;}).length;
    h+='<button class="btn-s" onclick="S.v=\'dash\';draw()">View Dashboard ('+submitted+'/4 submitted) →</button>';
    h+='</div>';
    app.innerHTML=h;
  });
}

function pw(name){
  S.w=name;
  var draft=loadDraft(name);
  if(draft){S.a=draft.a||{};S.n=draft.n||{};}
  else if(ALL[name]&&ALL[name].a){S.a=ALL[name].a||{};S.n=ALL[name].n||{};}
  else{S.a={};S.n={};}
  draw();
}

function goForm(){S.v='f';S.pg=0;draw();}

// ---- Form ----
function drawF(){
  var page=PAGES[S.pg];
  var total=PAGES.length;
  var qids=page.qs;
  var pageQs=[];
  for(var qi=0;qi<Q.length;qi++){if(qids.indexOf(Q[qi][0])>=0)pageQs.push(Q[qi]);}
  pageQs.sort(function(a,b){return qids.indexOf(a[0])-qids.indexOf(b[0]);});

  var pct=Math.round((S.pg/total)*100);
  var h='<div class="w">';
  h+='<div class="pbar-wrap"><div class="pbar-fill" style="width:'+pct+'%"></div></div>';
  h+='<div class="pbar-lbl"><span>'+page.sec+'</span><span>'+(S.pg+1)+' / '+total+'</span></div>';
  h+='<div class="pdots">';
  for(var i=0;i<total;i++)h+='<button class="pdot-btn'+(i===S.pg?' active':'')+'" onclick="gp('+i+')"></button>';
  h+='</div>';

  if(pageQs[0]&&pageQs[0][1]){
    h+='<div class="sec-h">'+pageQs[0][1]+'</div>';
    h+='<div class="sec-sub">'+pageQs[0][2]+'</div>';
  }

  for(var qi=0;qi<pageQs.length;qi++){
    var q=pageQs[qi];
    var id=q[0],qtext=q[3],ctx=q[4],opts=q[5];
    var sel=S.a[id]||[];
    h+='<div class="qblock">';
    h+='<h3>'+qtext+'</h3>';
    if(ctx)h+='<div class="ctx">'+ctx+'</div>';
    h+='<div class="opts">';
    for(var oi=0;oi<opts.length;oi++){
      var parts=opts[oi].split('|');
      var v=parts[0],l=parts[1],d=parts[2]||'';
      var isSel=sel.indexOf(v)>=0;
      h+='<button class="opt'+(isSel?' sel':'')+'" onclick="pk(\''+id+'\',\''+v+'\')">';
      h+='<div class="opt-box"><div class="opt-chk"></div></div>';
      h+='<div style="flex:1"><div class="opt-lbl">'+l+'</div>'+(d?'<div class="opt-desc">'+d+'</div>':'')+'</div></button>';
    }
    h+='</div>';
    if(S.n[id]!=null){
      h+='<div class="note-lbl">Your View</div>';
      h+='<textarea class="note-ta" id="nt_'+id+'" onblur="sn(\''+id+'\')" rows="2" placeholder="Anything else on your mind…">'+eh(S.n[id]||'')+'</textarea>';
    } else {
      h+='<button class="note-tog" onclick="opn(\''+id+'\')">+ Add a note</button>';
    }
    h+='</div>';
  }

  h+='<div class="nav">';
  if(S.pg>0)h+='<button class="nav-back" onclick="gp('+(S.pg-1)+')">← Back</button>';
  h+='<div class="sp"></div>';
  if(S.pg<total-1){
    h+='<button class="nav-next" onclick="gp('+(S.pg+1)+')">Next →</button>';
  } else {
    h+='<button class="nav-next" onclick="fin()">Review & Submit →</button>';
  }
  h+='</div></div>';
  app.innerHTML=h;
}

// ---- Submit / Done ----
function drawD(){
  var cnt=0;for(var k in S.a){if(S.a[k]&&S.a[k].length>0)cnt++;}
  var total=Q.length;
  var h='<div class="w"><div class="brand">Reflexion</div><h1>Review & <em>Submit</em></h1>';
  h+='<p class="body">You’ve answered <b>'+cnt+' of '+total+' questions</b>. Submit to add your responses to the shared dashboard.</p>';

  h+='<div class="card"><div class="card-title">Your completion by section</div>';
  for(var pi=0;pi<PAGES.length;pi++){
    var pg=PAGES[pi];
    var ans=0;
    for(var qi=0;qi<pg.qs.length;qi++){if(S.a[pg.qs[qi]]&&S.a[pg.qs[qi]].length>0)ans++;}
    var pct=Math.round((ans/pg.qs.length)*100);
    h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">';
    h+='<span style="font-weight:600">'+pg.sec+'</span><span style="color:#aaa">'+ans+'/'+pg.qs.length+'</span></div>';
    h+='<div style="height:4px;background:#f0ebe4;border-radius:2px"><div style="height:100%;width:'+pct+'%;background:'+(pct===100?'#2d9e5a':'#b8613e')+';border-radius:2px"></div></div></div>';
  }
  h+='</div>';

  h+='<div class="done-box"><div class="done-icon">🎯</div>';
  h+='<p style="font-size:15px;font-weight:600;color:#1a5a30;text-align:center;margin-bottom:6px">Ready to submit?</p>';
  h+='<p style="font-size:13px;color:#5a8060;text-align:center">Your responses will appear on the shared dashboard immediately.</p></div>';
  h+='<button class="btn-a" id="subBtn" onclick="doSubmit()">Submit my responses →</button>';
  h+='<button class="btn-s" onclick="S.v=\'f\';S.pg=0;draw()">← Go back and review</button>';
  h+='</div>';
  app.innerHTML=h;
}

function doSubmit(){
  var btn=document.getElementById('subBtn');
  if(btn){btn.textContent='Saving…';btn.disabled=true;}
  apiSave(function(ok,errMsg){
    if(ok){
      clearDraft(S.w);
      var h='<div class="w"><div style="text-align:center;padding:48px 0">';
      h+='<div style="font-size:56px;margin-bottom:16px">✅</div>';
      h+='<h1 style="font-size:24px;margin-bottom:8px">Submitted!</h1>';
      h+='<p class="body" style="text-align:center">Your responses are on the dashboard.</p></div>';
      h+='<button class="btn-p" onclick="S.v=\'dash\';draw()">View Dashboard →</button>';
      h+='<button class="btn-s" onclick="S.v=\'l\';S.w=null;draw()">← Home</button></div>';
      app.innerHTML=h;
    } else {
      var btn2=document.getElementById('subBtn');
      if(btn2){btn2.textContent='Submit my responses →';btn2.disabled=false;}
      var existing=document.getElementById('saveErrBox');
      if(existing&&existing.parentNode)existing.parentNode.removeChild(existing);
      var errBox=document.createElement('div');
      errBox.id='saveErrBox';
      errBox.style.cssText='background:#ffe5e0;border:1px solid #d44;color:#8b0000;padding:14px 16px;border-radius:8px;margin:14px 0;font-size:13px;line-height:1.5';
      errBox.innerHTML='<div style="font-weight:700;margin-bottom:4px">Submit failed — your responses were NOT saved.</div>'+
        (errMsg?'<div style="font-family:monospace;font-size:12px;margin-top:6px;opacity:.8">'+eh(errMsg)+'</div>':'')+
        '<div style="margin-top:8px">Please try again. If this keeps happening, ping Ajay — the database may be misconfigured.</div>';
      if(btn2&&btn2.parentNode)btn2.parentNode.insertBefore(errBox,btn2);
    }
  });
}

// ---- Dashboard ----
function drawDash(){
  app.innerHTML='<div class="w"><div class="spin">Loading dashboard…</div></div>';
  apiLoad(function(){
    var sub=W.filter(function(n){return ALL[n]&&ALL[n].at;});
    var n=sub.length;

    var h='<div class="w">';
    h+='<div class="brand">Reflexion · Coaching Culture Project</div>';
    h+='<h1>Alignment <em>Dashboard</em></h1>';

    if(LOAD_ERR){
      h+='<div style="background:#ffe5e0;border:1px solid #d44;color:#8b0000;padding:12px 14px;border-radius:8px;margin:12px 0;font-size:13px;line-height:1.5">'+
        '<div style="font-weight:700;margin-bottom:2px">Couldn’t load responses from the database.</div>'+
        '<div style="font-family:monospace;font-size:12px;opacity:.8">'+eh(LOAD_ERR)+'</div>'+
        '<div style="margin-top:6px">What you see below may be empty or stale. Try Refresh, or check Firebase rules.</div>'+
        '</div>';
    }

    // Status row
    h+='<div class="dash-status">';
    for(var i=0;i<W.length;i++){
      var nm=W[i];
      var done=!!(ALL[nm]&&ALL[nm].at);
      h+='<div class="d-partner"><div class="d-av '+(done?'done':'pending')+'">'+INI[nm]+'</div>';
      h+='<div class="d-name">'+nm+'</div></div>';
    }
    h+='</div>';

    if(n===0){
      h+='<p class="body">No responses yet. Partners will appear here as they submit.</p>';
    } else {
      h+='<p class="body"><b>'+n+' of 4</b> partner'+(n===1?'':'s')+' submitted'+(n<4?' — dashboard updates as more come in.':'.')+'</p>';

      // Draft Coaching Culture Model
      h+=buildModel(sub);

      // Where you\'re split
      h+=buildGaps(sub);

      // Section-by-section
      for(var pi=0;pi<PAGES.length;pi++){
        h+=buildSection(PAGES[pi],sub);
      }
    }

    h+='<div class="divider"></div>';
    h+='<button class="btn-s" onclick="apiLoad(function(){S.v=\'dash\';draw();})">&#8635; Refresh</button>';
    h+='<button class="btn-s" onclick="S.v=\'l\';draw()">← Back to home</button>';
    h+='</div>';
    app.innerHTML=h;
  });
}

function buildModel(sub){
  var n=sub.length;
  if(n<2)return'';
  var threshold=n>=3?3:2;
  var MODEL=[
    {label:"The Leader — how they show up",q:"q7"},
    {label:"The Team — everyday habits",q:"q8"},
    {label:"The Culture — unwritten rules",q:"q9"},
    {label:"The Organisation — conditions",q:"q10"}
  ];

  var modelHTML='';
  for(var mi=0;mi<MODEL.length;mi++){
    var m=MODEL[mi];
    var qdata=null;
    for(var qi=0;qi<Q.length;qi++){if(Q[qi][0]===m.q){qdata=Q[qi];break;}}
    if(!qdata)continue;
    var items=[];
    for(var oi=0;oi<qdata[5].length;oi++){
      var parts=qdata[5][oi].split('|');
      var v=parts[0],l=parts[1];
      var cnt=0;
      for(var si=0;si<sub.length;si++){if((ALL[sub[si]].a[m.q]||[]).indexOf(v)>=0)cnt++;}
      if(cnt>=threshold)items.push(l);
    }
    if(items.length>0){
      modelHTML+='<div class="model-card"><div class="model-head">'+m.label+'</div>';
      for(var ii=0;ii<items.length;ii++)modelHTML+='<div class="model-item"><span class="model-chk">✓</span>'+items[ii]+'</div>';
      modelHTML+='</div>';
    }
  }

  if(!modelHTML)return'';
  var h='<div><div class="sec-div"></div>';
  h+='<div class="sec-h">Draft Coaching Culture Model</div>';
  h+='<p class="body">Built from the options '+(threshold===n?'all':'most')+' partners agreed on.</p>';
  h+=modelHTML+'</div>';
  return h;
}

function buildGaps(sub){
  var n=sub.length;
  if(n<2)return'';
  // Single-select questions where people might differ
  var gapQids=["q17","q12","q13","q16","q19","q23","q25"];
  var gaps=[];
  for(var gi=0;gi<gapQids.length;gi++){
    var qid=gapQids[gi];
    var qdata=null;
    for(var qi=0;qi<Q.length;qi++){if(Q[qi][0]===qid){qdata=Q[qi];break;}}
    if(!qdata)continue;
    var picks={};
    for(var si=0;si<sub.length;si++){
      var nm=sub[si];
      var ans=(ALL[nm].a[qid]||[]);
      if(ans.length>0)picks[nm]=ans;
    }
    // Check if different
    var keys=Object.keys(picks);
    if(keys.length<2)continue;
    var first=picks[keys[0]].slice().sort().join(',');
    var allSame=true;
    for(var ki=1;ki<keys.length;ki++){
      if(picks[keys[ki]].slice().sort().join(',')!==first){allSame=false;break;}
    }
    if(!allSame)gaps.push({q:qdata,picks:picks});
  }

  if(gaps.length===0)return'';
  var h='<div><div class="sec-div"></div>';
  h+='<div class="sec-h">Where You\'re Split</div>';
  h+='<p class="body">These are the clearest differences — worth a focused conversation.</p>';
  for(var gi=0;gi<gaps.length;gi++){
    var gap=gaps[gi];
    h+='<div class="gap-card"><div class="gap-q">'+gap.q[3]+'</div><div class="gap-rows">';
    var pks=gap.picks;
    for(var wi=0;wi<W.length;wi++){
      var nm=W[wi];
      if(!pks[nm])continue;
      var labels=[];
      for(var ai=0;ai<pks[nm].length;ai++){
        for(var oi=0;oi<gap.q[5].length;oi++){
          var pts=gap.q[5][oi].split('|');
          if(pts[0]===pks[nm][ai]){labels.push(pts[1]);break;}
        }
      }
      h+='<div class="gap-row"><div class="gap-av">'+INI[nm]+'</div><span>'+labels.join(', ')+'</span></div>';
    }
    h+='</div></div>';
  }
  h+='</div>';
  return h;
}

function buildSection(page,sub){
  var n=sub.length;
  var h='<div><div class="sec-div"></div><div class="sec-h">'+page.sec+'</div>';
  for(var qi=0;qi<page.qs.length;qi++){
    var qid=page.qs[qi];
    var qdata=null;
    for(var qj=0;qj<Q.length;qj++){if(Q[qj][0]===qid){qdata=Q[qj];break;}}
    if(!qdata)continue;

    h+='<div class="q-analysis"><div class="q-text">'+qdata[3]+'</div>';

    // Compute opt counts
    var ocs=[];
    for(var oi=0;oi<qdata[5].length;oi++){
      var parts=qdata[5][oi].split('|');
      var v=parts[0],l=parts[1];
      var who=[];
      for(var si=0;si<sub.length;si++){
        var nm=sub[si];
        if((ALL[nm].a[qid]||[]).indexOf(v)>=0)who.push(nm);
      }
      ocs.push({v:v,l:l,cnt:who.length,who:who});
    }
    ocs.sort(function(a,b){return b.cnt-a.cnt;});

    var maxCnt=ocs.length>0?ocs[0].cnt:0;
    var badge='';
    if(n>=2){
      if(maxCnt===n&&n>=3)badge='<span class="cbadge all">Universal</span>';
      else if(maxCnt>=n&&n===2)badge='<span class="cbadge all">Agreed</span>';
      else if(maxCnt===n-1&&n>=3)badge='<span class="cbadge most">Strong consensus</span>';
      else if(maxCnt<=1&&n>=3)badge='<span class="cbadge div">Diverse views</span>';
      else badge='<span class="cbadge split">Split</span>';
    }
    if(badge)h+=badge;

    for(var oi=0;oi<ocs.length;oi++){
      var oc=ocs[oi];
      var pct=n>0?Math.round((oc.cnt/n)*100):0;
      var barCls=oc.cnt===n?'bar-all':oc.cnt>=n-1&&n>1?'bar-most':oc.cnt>n/2?'bar-half':'bar-few';
      h+='<div class="opt-row"><div class="mini-avs">';
      for(var wi=0;wi<W.length;wi++){
        var nm=W[wi];
        var isSubmitted=sub.indexOf(nm)>=0;
        var isSel=oc.who.indexOf(nm)>=0;
        h+='<div class="m-av '+(isSubmitted?(isSel?'y':'n'):'skip')+'">'+INI[nm]+'</div>';
      }
      h+='</div>';
      h+='<div class="opt-bar-wrap"><div class="opt-bar '+barCls+'" style="width:'+pct+'%"></div></div>';
      h+='<div class="opt-row-lbl">'+oc.l+'</div>';
      h+='<div class="opt-cnt">'+oc.cnt+'/'+n+'</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

// ---- Handlers ----
function pk(id,v){
  var c=S.a[id]||[];
  var i=c.indexOf(v);
  if(i>=0)c.splice(i,1);else c.push(v);
  S.a[id]=c;saveDraft();drawF();
}
function opn(id){S.n[id]='';drawF();setTimeout(function(){var el=document.getElementById('nt_'+id);if(el)el.focus();},50);}
function sn(id){var el=document.getElementById('nt_'+id);if(el){S.n[id]=el.value;saveDraft();}}
function gp(p){
  var tas=document.querySelectorAll('textarea[id^="nt_"]');
  for(var i=0;i<tas.length;i++){var m=tas[i].id.match(/^nt_(.+)$/);if(m){S.n[m[1]]=tas[i].value;}}
  saveDraft();S.pg=p;draw();window.scrollTo(0,0);
}
function fin(){
  var tas=document.querySelectorAll('textarea[id^="nt_"]');
  for(var i=0;i<tas.length;i++){var m=tas[i].id.match(/^nt_(.+)$/);if(m){S.n[m[1]]=tas[i].value;}}
  saveDraft();S.v='d';draw();window.scrollTo(0,0);
}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reflexion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#faf8f4;color:#3a3530;line-height:1.6}
.w{max-width:540px;margin:0 auto;padding:20px}
.br{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#b8613e;font-weight:600;margin-bottom:14px}

.pb{padding:12px;border:2px solid #ece7df;border-radius:6px;background:#fff;font-size:15px;font-weight:600;color:#1a2744;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:8px}

.pg-dot.a{background:#b8613e}

.op:hover{border-color:#ddd}.op.a{border-color:#b8613e;background:#fef8f5}
.dk{flex-shrink:0;width:18px;height:18px;border:2px solid #ccc;border-radius:3px;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.op.a .dk{border-color:#b8613e}.di{width:8px;height:8px;border-radius:2px;background:#b8613e;display:none}
.op.a .di{display:block}.ol{font-weight:600;color:#1a2744;line-height:1.35}.od{font-size:12.5px;color:#8a8480;margin-top:2px;line-height:1.45}
.ab{margin-top:10px;background:none;border:none;font-size:12.5px;color:#9a9590;padding:4px 0;cursor:pointer;font-family:inherit}
.ab:hover{color:#b8613e}
.ta{width:100%;padding:10px 12px;border:1.5px solid #ece7df;border-radius:6px;font-size:13.5px;font-family:inherit;line-height:1.55;margin-top:6px;resize:vertical;color:#3a3530}
.ta:focus{outline:none;border-color:#b8613e}
.nl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#aaa;margin-top:10px}
.nv{display:flex;gap:8px;margin-top:20px}.nv .sp{flex:1}

.cr{display:flex;flex-direction:column;gap:6px;margin:10px 0}

</style></head><body><div id="app"></div>
<script>
var S={w:null,v:"l",a:{},n:{},pg:0},W=["Urvashi","Suva","Samhita","Ajay"],PER=4,app=document.getElementById("app");
var MEM={};
var RCODES=["","","",""];

var Q=[
["q0","Why Are We Doing This?","Before anything else \u2014 why is Reflexion investing in this? What\u2019s the purpose, and what are we willing to commit?","Why is Reflexion doing this project?","What\u2019s the deeper purpose? Select all that ring true.",["voice|To become THE credible voice on coaching culture in India","ip|To build original IP \u2014 a model, a diagnostic, a book","conv|To start better conversations with CEOs and CHROs","market|To create a new market category that Reflexion owns","legacy|To contribute something meaningful to the profession"]],
["q0b","","","How do we realistically make this happen alongside client work?","Select all approaches you\u2019d support.",["blend_bd|Weave coaching culture into BD and proposals \u2014 then repurpose for the project","blend_ws|Add a coaching culture section into existing workshops \u2014 builds IP while delivering","content_q|Each partner writes or reviews one piece per quarter","intern|Invest in an intern to support research and content \u2014 scale to a hire later","nima_ext|Extend Nima\u2019s engagement and ask her to build an intern into her team","half_day|Dedicate half a day per month specifically to this","lead_ws|One partner owns each workstream (report, product, content, book)","speak|Each of us speaks about coaching culture at 2+ events this year"]],
["q1","Who Is This For?","Before we define coaching culture, let\u2019s be clear about whose problem we\u2019re solving.","What challenge are we helping organisations address?","Think about your client conversations. Select all that resonate.",["pipeline|Leadership pipeline is too thin|Growing faster than they can develop leaders","retain|Best people keep leaving|Managed, not developed","adapt|Organisation can\u2019t keep up with change|Too much command-and-control","scale|Coaching works 1-on-1 but doesn\u2019t scale|How to build it across thousands?","mid|Middle managers are the bottleneck|Senior leaders get it, layer below doesn\u2019t"]],
["q2","","","What happens in organisations without coaching culture?","Select all symptoms you see.",["turnover|High-potential leaders leave","stagnation|Leaders deliver but can\u2019t grow others","slow|Decisions pile up at the top","disengage|People do the minimum","fear|People don\u2019t speak up","repeat|Same problems recur despite training"]],
["q3","","","Which organisations would benefit most?","Select all.",["tech|Scaling tech and SaaS (500\u20135000)","gcc|Global Capability Centres","mfg|Manufacturing and pharma","fmcg|FMCG and retail","bfsi|Banking and financial services","all|Cross-sector \u2014 universal"]],
["q4","What Are We Actually Studying?","Nima\u2019s presentation gave us a rich picture of coaching practices and maturity \u2014 who buys coaching, how it\u2019s delivered, what stage organisations are at. That\u2019s valuable. But the deeper question is: has coaching changed how people lead, relate, and work? That\u2019s the shift from coaching maturity to coaching culture.","When we say \u2018coaching culture,\u2019 what do we mean?","Select all that fit.",["programs|How organisations invest in coaching|Budgets, delivery, ROI","leadership|How leaders actually show up day to day|Ask or tell? Develop people?","norms|What\u2019s considered normal behaviour|Feedback flowing? Reflection a habit?","system|How systems support it|Coaching woven into HR processes?","gap|The gap between spending and actually changing|Buy coaching but haven\u2019t changed"]],
["q5","","","Most powerful report headline?","Select all that appeal.",["gap|\u2018India invests in coaching \u2014 but hasn\u2019t built coaching cultures\u2019","inside|\u2018What coaching culture actually feels like from inside\u2019","map|\u2018Where Indian organisations stand on the coaching journey\u2019","surprise|\u2018The one thing that predicts coaching culture \u2014 not what you\u2019d think\u2019"]],
["q6","","","Whose experience should the research reflect?","Select all that matter.",["chro|CHROs and HR leaders (already in study)","senior|Senior leaders who\u2019ve been coached","mid|Mid-level managers \u2014 coaching AND coached","ground|People three levels down","coaches|External coaches across organisations"]],
["q7","The Coaching Culture Model","We\u2019re building a clear picture of what coaching culture looks like. This becomes Reflexion\u2019s IP. The research tests and deepens it.","If you spent a day with a leader in a coaching culture, what would you see?","Select all essential behaviours.",["ask|They ask questions before giving answers","listen|They listen to understand, not just respond","empower|They let people decide instead of deciding for them","coached|They get coached themselves and are open about it","feedback|They give feedback in the moment","time|They carve out real time for development conversations"]],
["q8","","","What everyday habits signal coaching culture across the organisation?","Select all.",["questions|People explore before prescribing \u2014 questions first","fb|Feedback happens in real time","reflect|Teams regularly pause to ask \u2018what did we learn?\u2019","challenge|People can push back without fear","own|People drive their own development"]],
["q9","","","What unwritten rules does a coaching culture run on?","Select all.",["grow|\u2018People can change and grow\u2019 \u2014 capability is built, not fixed","help|\u2018Asking for help is smart\u2019 \u2014 coaching shows strength","trust|\u2018We trust people to figure it out\u2019 \u2014 autonomy over control","fail|\u2018Mistakes are how we learn\u2019 \u2014 failure doesn\u2019t end careers","whole|\u2018Development is about the whole person\u2019 \u2014 not just targets"]],
["q10","","","What conditions does the organisation need to provide?","Select all.",["budget|Real budget dedicated to coaching","hr|Coaching woven into performance and promotion","internal|Internal coaching capability, not just external","measure|Measurement that tracks behaviour change","reward|People who coach are recognised","walk|Senior leaders model it themselves","safety|Enough psychological safety for honest conversations","time|Leaders actually have time for development"]],
["q11","","","How should we describe maturity stages?","Select all that appeal.",["four|Unaware \u2192 Exploring \u2192 Building \u2192 Living It","three|Spending \u2192 Doing \u2192 Being a Coaching Culture","arch|Types: \u2018The Buyer\u2019 / \u2018The Builder\u2019 / \u2018The Natural\u2019"]],
["q12","","","Should the model acknowledge when coaching ISN\u2019T the answer?","",["yes|Yes \u2014 adds credibility","brief|Briefly","no|Stay positive"]],
["q13","","","Should the model vary by sector?","",["one|One model, adapt in application","flex|Same structure, sector-specific examples","diff|Different models per sector"]],
["q14","Making the Research Stronger","We have 41 interviews and 250 survey respondents. How do we get the most from what we have?","How should we frame the survey data?","250 across 5 sectors \u2248 50 per sector.",["directional|Be upfront \u2014 numbers are indicative","pulse|Add a short follow-up survey to more people","qual_star|Lead with interview stories, numbers as support"]],
["q15","","","How do we ensure findings reflect reality?","When you ask leaders \u2018do you coach?\u2019 most say yes. Their teams may disagree.",["multi|Include voices from further down","gap|Build \u2018what we intend vs what happens\u2019 into analysis","accept|Acknowledge as limitation, interpret carefully"]],
["q16","","","Should we look for something unexpected?","",["hunt|Yes \u2014 actively look for a surprise","open|Stay open but don\u2019t force it","positive|Build a strong positive case"]],
["q17","What We Build","What does the Coaching Culture project become for Reflexion?","How ambitious do we want to be?","This is the biggest strategic choice.",["launch|One-time launch \u2014 publish report, send to stakeholders, do an event, move on|Gets credibility. But it\u2019s a moment, not a movement.","project|Ongoing project \u2014 report + diagnostic + book + regular content|Builds IP over time. Requires sustained effort.","property|Build \u2018The State of Coaching Culture in India\u2019 \u2014 an annual benchmark|Like \u2018Best Places to Work\u2019 for coaching culture. Highest ambition. Multi-year commitment."]],
["q17b","","","If we build an annual \u2018State of Coaching Culture\u2019 property, what does it need?","Select all that feel necessary.",["maximise|Maximise publicity from THIS research as the foundation year","quant_invest|Commission a larger quant study on top (needs investment, gives statistical weight)","website|Create a dedicated website section","ongoing_survey|Run an ongoing survey orgs can take any time","assess_product|Evolve a paid assessment product","annual|Repeat the full study annually","rankings|Consider a ranking or certification","partner_prop|Partner with a media house to co-own the property"]],
["q18","","","What should readers DO after the report?","Select all.",["understand|Understand the landscape","diagnose|Assess where their own organisation is","act|Know what to do next \u2014 stage-specific playbook"]],
["q19","","","The diagnostic product?","",["full|Full paid assessment from the start","lite|Free scan first, paid product later","later|Model first, product later"]],
["q20","","","The book by Urvashi and Suva?","Select all.",["stories|Real stories from inside organisations","indian|The Indian leadership context","ip|The Reflexion model as IP","all|All three combined"]],
["q21","","","Audience and reach?","Select all.",["ceo|CEOs and business leaders","chro|CHROs and L&D leaders","both|Both \u2014 different versions for each","cadence_60|Release content every 2 months","cadence_q|Quarterly content","brand_first|Lead with reputation \u2014 open everything","funnel|Content \u2192 diagnostic \u2192 client conversation","product_rev|Diagnostic as standalone revenue product"]],
["q23","Partnerships","Partnerships give reach and credibility fast. But they mean sharing credit and possibly sharing a stage with competitors.","Should we partner to amplify this work?","",["yes_big|Yes \u2014 essential for visibility","selective|Yes, but very selectively","solo|No \u2014 build our brand first"]],
["q24","","","Which types of partners add most value?","Select all.",["hr_body|HR bodies (NHRDN, SHRM)|Legitimacy, HR networks","icf|International Coach Federation|Global coaching credibility","media|Business media (ET, People Matters)|Reach, distribution","peer|Complementary firms (search, leadership dev)|Relationships, introductions","academic|Business schools|Academic credibility"]],
["q25","","","Risk of partnering with complementary firms?","They bring relationships but may compete for clients.",["worth_it|Worth it \u2014 visibility outweighs overlap","case_by_case|Depends on the firm","avoid|Avoid \u2014 build our own reach","separate|Partner for research, keep product exclusively ours"]],
["q26","","","How do we protect ownership?","Select all.",["brand_lead|Reflexion always the lead brand","ip_own|Model and diagnostic 100% Reflexion IP","data_ours|All research data stays with us","contrib|Partners contribute distribution, not content"]]
];

function sk(n){return"rfx3_"+n;}
function sv(){
  if(!S.w)return;
  var d=JSON.stringify({a:S.a,n:S.n,done:S.v==="d"});
  MEM[sk(S.w)]=d;
  try{localStorage.setItem(sk(S.w),d);}catch(e){}
  try{if(window.storage&&window.storage.set)window.storage.set(sk(S.w),d,true);}catch(e){}
}
function lp(name){
  S.w=name;S.a={};S.n={};
  var raw=null;
  try{raw=localStorage.getItem(sk(name));}catch(e){}
  if(!raw)raw=MEM[sk(name)]||null;
  if(raw){try{var d=JSON.parse(raw);S.a=d.a||{};S.n=d.n||{};}catch(e){}}
  try{
    if(!raw&&window.storage&&window.storage.get){
      var p=window.storage.get(sk(name));
      if(p&&typeof p.then==="function")p.then(function(v){if(v&&S.w===name){try{var d=JSON.parse(v);S.a=d.a||{};S.n=d.n||{};draw();}catch(e){}}}).catch(function(){});
    }
  }catch(e){}
}
function gr(name){var r=null;try{r=localStorage.getItem(sk(name));}catch(e){}return r||MEM[sk(name)]||null;}
function isDone(name){var r=gr(name);try{return!!(r&&JSON.parse(r).done);}catch(e){return false;}}
function xCode(name){
  var r=gr(name);if(!r)return null;
  try{var d=JSON.parse(r);return btoa(JSON.stringify({who:name,a:d.a||{},n:d.n||{}}));}catch(e){return null;}
}
function pCode(c){try{return JSON.parse(atob(c.trim()));}catch(e){return null;}}

function draw(){
  if(S.v==="l")drawL();
  else if(S.v==="f")drawF();
  else if(S.v==="d")drawD();
  else drawC();
}

function drawL(){
  var h='<div class="w"><div class="br">Reflexion \u00b7 Coaching Culture Project</div><h1>Strategy <em>Builder</em></h1>';
  h+='<p class="p">Our Coaching Culture project can shape Reflexion\u2019s positioning, products, and point of view. 27 reflections across 7 sections \u2014 about 20 minutes.</p>';
  h+='<div class="ob"><div class="ot">What This Produces</div>';
  h+='<div class="oi"><div class="on2">1</div><div class="ox"><b>A draft Coaching Culture model</b> \u2014 behaviours, habits, unwritten rules, and conditions</div></div>';
  h+='<div class="oi"><div class="on2">2</div><div class="ox"><b>A brief for Nima</b> \u2014 to rework the report through a coaching culture lens</div></div>';
  h+='<div class="oi"><div class="on2">3</div><div class="ox"><b>A project direction</b> \u2014 report, product, book, partnerships, and what we each commit to</div></div>';
  h+='<div class="oi"><div class="on2">4</div><div class="ox"><b>An alignment report</b> \u2014 generated after all partners complete this</div></div></div>';
  h+='<div class="lb">I am</div><div class="pg">';
  for(var i=0;i<W.length;i++){
    var done=isDone(W[i]),sel=S.w===W[i];
    h+='<button class="pb'+(sel?" a":"")+'" onclick="pw(\''+W[i]+'\')">'+W[i];
    if(done)h+='<span class="pd" title="Completed"></span>';
    h+='</button>';
  }
  h+='</div>';
  if(S.w){
    var done=isDone(S.w);
    h+='<button class="b1" onclick="go()">'+(done?"Continue my reflections \u2192":"Begin reflections \u2192")+'</button>';
    if(done){var code=xCode(S.w);if(code){
      h+='<div class="ob" style="margin-top:8px"><div class="ot">Your response code</div>';
      h+='<div class="cb">'+code+'</div>';
      h+='<button class="bt" id="cbL" onclick="cp(\'cbL\',\''+encodeURIComponent(code)+'\')">Copy and send to Ajay</button>';
      h+='<p style="font-size:12px;color:#aaa;text-align:center;margin-top:4px">Send via WhatsApp or email</p></div>';
    }}
  } else {h+='<p class="hn">Select your name to begin</p>';}
  h+='<div class="div"></div>';
  h+='<button class="b2" onclick="S.v=\'c\';draw()">Collect all responses (Ajay) \u2192</button>';
  h+='</div>';
  app.innerHTML=h;
}
function pw(w){lp(w);draw();}
function go(){S.v="f";S.pg=0;draw();window.scrollTo(0,0);}

function drawF(){
  var st=S.pg*PER,batch=Q.slice(st,st+PER),cnt=0;for(var k in S.a)if(S.a[k]&&S.a[k].length)cnt++;
  var pct=Math.round(cnt/Q.length*100),pages=Math.ceil(Q.length/PER);
  var h='<div class="bar"><div class="bf" style="width:'+pct+'%"></div></div><div class="w">';
  h+='<div class="tb"><span>'+S.w+'</span><span>'+cnt+'/'+Q.length+' answered</span></div>';
  h+='<div class="pg-dots">';
  for(var p=0;p<pages;p++)h+='<button class="pg-dot'+(p===S.pg?" a":"")+'" onclick="gp('+p+')"></button>';
  h+='</div>';
  var cs="";
  for(var i=0;i<batch.length;i++){
    var q=batch[i],id=q[0],sec=q[1],sub=q[2],ql=q[3],cx=q[4],opts=q[5];
    if(sec&&sec!==cs){cs=sec;h+='<div class="sh">'+sec+'</div>';if(sub)h+='<p class="ss">'+sub+'</p>';}
    h+='<div class="qc"><h3>'+ql+'</h3>';if(cx)h+='<p class="cx">'+cx+'</p>';h+='<div class="os">';
    for(var j=0;j<opts.length;j++){
      var pt=opts[j].split("|"),v=pt[0],l=pt[1],d=pt[2]||"",sel=(S.a[id]||[]).indexOf(v)>=0;
      h+='<button class="op'+(sel?" a":"")+'" onclick="pk(\''+id+'\',\''+v+'\')">';
      h+='<div class="dk"><div class="di"></div></div>';
      h+='<div style="flex:1"><div class="ol">'+l+'</div>'+(d?'<div class="od">'+d+'</div>':'')+'</div></button>';
    }
    h+='</div>';
    if(S.n[id]!=null)h+='<div class="nl">Your View</div><textarea class="ta" id="n_'+id+'" onblur="sn(\''+id+'\')" rows="2" placeholder="Anything else on your mind...">'+(S.n[id]||'')+'</textarea>';
    else h+='<button class="ab" onclick="opn(\''+id+'\')">+ Add your own thinking</button>';
    h+='</div>';
  }
  h+='<div class="nv">';
  if(S.pg>0)h+='<button class="nb" onclick="gp('+(S.pg-1)+')">\u2190 Back</button>';
  h+='<div class="sp"></div>';
  if(S.pg<pages-1)h+='<button class="np" onclick="gp('+(S.pg+1)+')">Next \u2192</button>';
  else h+='<button class="np" onclick="fin()">Finish \u2192</button>';
  h+='</div></div>';
  app.innerHTML=h;
}
function pk(id,v){var c=S.a[id]||[],i=c.indexOf(v);if(i>=0)c.splice(i,1);else c.push(v);S.a[id]=c;sv();drawF();}
function opn(id){S.n[id]="";drawF();setTimeout(function(){var el=document.getElementById("n_"+id);if(el)el.focus();},40);}
function sn(id){var el=document.getElementById("n_"+id);if(el){S.n[id]=el.value;sv();}}
function gp(p){var els=document.querySelectorAll("textarea[id^='n_']");for(var i=0;i<els.length;i++){var m=els[i].id.match(/^n_(.+)$/);if(m)S.n[m[1]]=els[i].value;}sv();S.pg=p;draw();window.scrollTo(0,0);}
function fin(){gp(0);S.v="d";sv();draw();window.scrollTo(0,0);}

function drawD(){
  var cnt=0;for(var k in S.a)if(S.a[k]&&S.a[k].length)cnt++;
  var code=xCode(S.w)||"";
  var h='<div class="w"><div class="br">Reflexion</div><h1>Thank you, '+S.w+'</h1>';
  h+='<p class="p">You\u2019ve completed <b>'+cnt+' of '+Q.length+'</b> reflections. Your responses are saved on this device.</p>';
  h+='<div class="ob"><div class="ot">What happens next</div>';
  h+='<div class="oi"><div class="on2">1</div><div class="ox">Each partner completes this on their own device</div></div>';
  h+='<div class="oi"><div class="on2">2</div><div class="ox"><b>Copy your response code below</b> and send it to Ajay via WhatsApp or email</div></div>';
  h+='<div class="oi"><div class="on2">3</div><div class="ox">Ajay brings all four codes to Claude to generate the <b>full alignment report</b></div></div>';
  h+='<div class="oi"><div class="on2">4</div><div class="ox">We hold a focused <b>partner call</b> \u2014 time only on the splits</div></div></div>';
  if(code){
    h+='<div class="ob"><div class="ot">Your response code \u2014 copy and send to Ajay</div>';
    h+='<div class="cb">'+code+'</div>';
    h+='<button class="bt" id="cbD" onclick="cp(\'cbD\',\''+encodeURIComponent(code)+'\')">Copy response code</button>';
    h+='<p style="font-size:12px;color:#aaa;text-align:center;margin-top:4px">Ajay needs this to generate the alignment report</p></div>';
  }
  h+='<div class="nv"><button class="nb" onclick="S.v=\'f\';S.pg=0;draw()">\u2190 Review answers</button><div class="sp"></div><button class="np" onclick="S.v=\'l\';draw()">Home</button></div></div>';
  app.innerHTML=h;
}

function drawC(){
  for(var i=0;i<W.length;i++){if(!RCODES[i]){var c=xCode(W[i]);if(c)RCODES[i]=c;}}
  var vc=0;for(var i=0;i<RCODES.length;i++){if(RCODES[i]&&pCode(RCODES[i]))vc++;}
  var h='<div class="w"><div class="br">Reflexion</div><h1>Collect <em>Responses</em></h1>';
  h+='<p class="p">Paste each partner\u2019s response code below. Codes from this device are pre-filled automatically.</p>';
  h+='<div class="chips">';
  for(var i=0;i<W.length;i++){var done=RCODES[i]&&pCode(RCODES[i]);h+='<span class="chip '+(done?"y":"n")+'">'+W[i]+(done?" \u2713":"")+'</span>';}
  h+='</div>';
  for(var i=0;i<W.length;i++){
    var valid=RCODES[i]&&pCode(RCODES[i]),err=RCODES[i]&&!valid;
    h+='<div class="cr"><label>'+W[i]+'</label>';
    h+='<input type="text" id="rc'+i+'" placeholder="Paste code\u2026" value="'+eh(RCODES[i])+'" '+(valid?'class="ok"':err?'class="err"':'')+' oninput="uc('+i+')" /></div>';
  }
  if(vc>0){
    var allC=[];for(var i=0;i<RCODES.length;i++){if(RCODES[i]&&pCode(RCODES[i]))allC.push(W[i]+":"+RCODES[i]);}
    var block="=== REFLEXION PARTNER RESPONSES ===\n"+allC.join("\n")+"\n===================================";
    h+='<div style="margin-top:16px"><div class="ot">Copy for Claude \u2014 paste into your Cowork conversation</div>';
    h+='<p style="font-size:13px;color:#8a8480;margin-bottom:8px">Claude will generate the full alignment report as a Word document from this block.</p>';
    h+='<div class="cb">'+eh(block)+'</div>';
    h+='<button class="bt" id="cbC" onclick="cp(\'cbC\',\''+encodeURIComponent(block)+'\')">Copy for Claude ('+(vc)+' response'+(vc!==1?"s":"")+')</button>';
    h+='</div>';
  } else {
    h+='<p class="hn" style="margin-top:16px">Paste at least one response code to continue</p>';
  }
  h+='<div class="div"></div>';
  h+='<button class="b2" onclick="S.v=\'l\';draw()">\u2190 Back</button></div>';
  app.innerHTML=h;
}
function eh(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function uc(i){
  var el=document.getElementById("rc"+i);if(!el)return;
  var v=el.value.trim();RCODES[i]=v;
  el.className=v?(pCode(v)?"ok":"err"):"";
  drawC();
}
function cp(btnId,enc){
  var t=decodeURIComponent(enc);
  function flash(){var b=document.getElementById(btnId);if(b){b.textContent="Copied!";b.classList.add("ok");setTimeout(function(){b.textContent=b.textContent.replace("Copied!","Copy response code");b.classList.remove("ok");},2500);}}
  try{navigator.clipboard.writeText(t).then(flash).catch(function(){fb(t);flash();});}catch(e){fb(t);flash();}
}
function fb(t){var a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(a);}
draw();
</script></body></html>
